services:
  bookingforge-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bookingforge-mssql-container
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=BookingForge2026!
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "BookingForge2026!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  bookingforge-app:
    build: .
    container_name: bookingforge-api-container
    ports:
      - "8080:8080"
    depends_on:
      bookingforge-db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://bookingforge-db:1433;databaseName=master;encrypt=true;trustServerCertificate=true;
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=BookingForge2026!